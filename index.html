<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduDobble — Atelier de Jeux ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800;900&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --col1: #FF6B6B;
            --col2: #FFD93D;
            --col3: #6BCB77;
            --col4: #4D96FF;
            --col5: #C77DFF;
            --col6: #FF9A3C;
            --bg: #FFF8F0;
            --surface: #FFFFFF;
            --text: #2D2D2D;
            --text-soft: #888;
            --radius: 24px;
            --radius-sm: 14px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* ── BACKGROUND DOODLES ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image:
                radial-gradient(circle at 8% 15%, rgba(255,107,107,0.08) 0%, transparent 40%),
                radial-gradient(circle at 92% 25%, rgba(77,150,255,0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 85%, rgba(107,203,119,0.08) 0%, transparent 40%);
            pointer-events: none;
        }

        .app-wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

        /* ── HEADER ── */
        header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 32px; flex-wrap: wrap; gap: 16px;
        }
        .logo-block { display: flex; flex-direction: column; }
        .logo-title {
            font-family: 'Baloo 2', cursive;
            font-size: 2.4rem; font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, var(--col1) 0%, var(--col6) 40%, var(--col2) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo-sub { font-size: 0.8rem; color: var(--text-soft); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }

        .btn-print {
            background: linear-gradient(135deg, var(--col1), var(--col6));
            color: white; border: none; cursor: pointer;
            font-family: 'Baloo 2', cursive; font-size: 1.05rem; font-weight: 700;
            padding: 14px 28px; border-radius: 50px;
            box-shadow: 0 6px 20px rgba(255,107,107,0.35);
            transition: transform 0.15s, box-shadow 0.15s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-print:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255,107,107,0.45); }
        .btn-print:active { transform: translateY(0); }

        /* ── LAYOUT ── */
        .main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 24px; }
        @media (max-width: 800px) { .main-grid { grid-template-columns: 1fr; } }

        /* ── CARDS ── */
        .panel {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border: 2px solid #F0EBE3;
        }
        .panel + .panel { margin-top: 20px; }

        .panel-title {
            font-family: 'Baloo 2', cursive; font-size: 1.1rem; font-weight: 700;
            display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
            color: var(--text);
        }

        /* ── MODE BUTTONS ── */
        .mode-row { display: flex; gap: 12px; }
        .mode-btn {
            flex: 1; border: 2px solid #E5DDD5; background: #FAF7F4;
            border-radius: var(--radius-sm); padding: 12px;
            font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.9rem;
            cursor: pointer; transition: all 0.18s; color: #888;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .mode-btn .mode-icon { font-size: 1.6rem; }
        .mode-btn.active {
            border-color: var(--col4); background: #EEF5FF; color: var(--col4);
            box-shadow: 0 4px 14px rgba(77,150,255,0.2);
        }
        .mode-btn:hover:not(.active) { border-color: #CCBFB5; background: #FFF3EB; }

        /* ── SYMBOL INPUT ── */
        .input-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .txt-input {
            flex: 1; padding: 10px 14px; border: 2px solid #E5DDD5; border-radius: var(--radius-sm);
            font-family: 'Nunito', sans-serif; font-size: 0.95rem; outline: none;
            transition: border-color 0.15s;
        }
        .txt-input:focus { border-color: var(--col4); }
        .btn-add {
            background: var(--col4); color: white; border: none; cursor: pointer;
            padding: 10px 18px; border-radius: var(--radius-sm);
            font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.9rem;
            transition: background 0.15s, transform 0.1s;
        }
        .btn-add:hover { background: #2d82ff; transform: scale(1.04); }

        .file-upload-btn {
            width: 100%; padding: 10px; border: 2px dashed #CBBFB5;
            background: #FAF7F4; border-radius: var(--radius-sm);
            font-family: 'Nunito', sans-serif; font-weight: 700; color: #AAA;
            cursor: pointer; font-size: 0.88rem; transition: all 0.15s;
        }
        .file-upload-btn:hover { border-color: var(--col6); color: var(--col6); background: #FFF6EE; }

        /* ── POOL GRID ── */
        .pool-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
            gap: 8px; max-height: 160px; overflow-y: auto;
            padding: 10px; background: #FAF7F4; border-radius: var(--radius-sm);
            border: 2px solid #F0EBE3;
        }
        .pool-grid:empty::after {
            content: 'Aucun symbole ajouté…'; color: #CCC; font-size: 0.8rem;
            grid-column: 1 / -1; text-align: center; padding: 12px 0;
        }
        .pool-item {
            aspect-ratio: 1; background: white; border-radius: 10px;
            border: 2px solid #EEE; display: flex; align-items: center; justify-content: center;
            font-size: 1rem; font-weight: 800; position: relative; overflow: hidden; cursor: default;
            transition: transform 0.12s;
        }
        .pool-item:hover { transform: scale(1.08); }
        .pool-item .del-btn {
            position: absolute; inset: 0; background: rgba(255,60,60,0.88);
            color: white; display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; opacity: 0; cursor: pointer; transition: opacity 0.12s;
        }
        .pool-item:hover .del-btn { opacity: 1; }

        /* ── PRESETS ── */
        .preset-section { margin-top: 14px; padding-top: 14px; border-top: 2px dashed #F0EBE3; }
        .preset-label { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: #AAA; margin-bottom: 10px; }
        .preset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }

        /* Preset accordion */
        .preset-card {
            border: 2px solid #EEE; border-radius: var(--radius-sm);
            overflow: hidden; background: white; transition: border-color 0.18s;
        }
        .preset-card.open { border-color: var(--col4); }

        .preset-card-header {
            padding: 10px 12px; display: flex; align-items: center; gap: 8px;
            cursor: pointer; user-select: none; transition: background 0.15s;
        }
        .preset-card-header:hover { background: #F7F4FF; }
        .preset-card-icon { font-size: 1.3rem; }
        .preset-card-name { font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 0.95rem; }
        .preset-card-desc { font-size: 0.72rem; color: var(--text-soft); margin-top: 1px; }
        .preset-card-arrow { margin-left: auto; font-size: 0.8rem; color: #AAA; transition: transform 0.2s; }
        .preset-card.open .preset-card-arrow { transform: rotate(180deg); }

        .preset-selector {
            display: none; padding: 10px 12px 12px;
            background: #FAF7F4; border-top: 2px solid #F0EBE3;
        }
        .preset-card.open .preset-selector { display: block; }

        .preset-symbols-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }

        .sym-check {
            display: flex; align-items: center; justify-content: center;
            min-width: 38px; height: 38px; padding: 0 6px;
            border: 2px solid #E5DDD5; border-radius: 8px;
            background: white; cursor: pointer; transition: all 0.12s;
            font-size: 0.85rem; font-weight: 800;
            user-select: none;
        }
        .sym-check:hover { border-color: var(--col4); background: #EEF5FF; }
        .sym-check.checked { border-color: var(--col4); background: var(--col4); color: white; }

        .preset-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .preset-select-all {
            font-size: 0.75rem; font-weight: 800; color: var(--col4);
            background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0;
        }
        .preset-count-label { font-size: 0.75rem; color: var(--text-soft); font-weight: 600; }
        .preset-add-btn {
            margin-left: auto; padding: 7px 16px; border: none; cursor: pointer;
            background: linear-gradient(135deg, var(--col3), #3EC16D);
            color: white; border-radius: 8px; font-family: 'Nunito', sans-serif;
            font-weight: 800; font-size: 0.82rem; transition: opacity 0.15s, transform 0.1s;
        }
        .preset-add-btn:hover { opacity: 0.9; transform: scale(1.02); }
        .preset-add-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* ── CUSTOMIZATION ── */
        .color-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
        .color-dot {
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
            border: 3px solid transparent; transition: all 0.15s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
        }
        .color-dot:hover, .color-dot.active { border-color: var(--text); transform: scale(1.15); }

        .shape-row { display: flex; gap: 8px; }
        .shape-btn {
            flex: 1; padding: 8px; border: 2px solid #E5DDD5; background: #FAF7F4;
            border-radius: var(--radius-sm); cursor: pointer; font-family: 'Nunito', sans-serif;
            font-weight: 700; font-size: 0.82rem; color: #888; transition: all 0.15s;
        }
        .shape-btn:hover { border-color: var(--col5); color: var(--col5); }
        .shape-btn.active { border-color: var(--col5); background: #F5EEFF; color: var(--col5); }

        .size-range { width: 100%; accent-color: var(--col6); }

        /* ── SIDEBAR / PREVIEW ── */
        .sidebar { position: sticky; top: 24px; }

        .preview-panel {
            background: linear-gradient(160deg, #2D1B69 0%, #11073A 100%);
            border-radius: 28px;
            padding: 28px 20px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 16px 40px rgba(45,27,105,0.35);
            color: white;
        }
        .preview-label { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em; opacity: 0.4; margin-bottom: 20px; }

        .preview-card-wrap {
            width: 200px; height: 200px;
            display: flex; align-items: center; justify-content: center;
        }
        #previewContainer {
            width: 180px; height: 180px;
            background: white;
            border: 4px solid rgba(255,255,255,0.2);
            position: relative; overflow: hidden;
            transition: border-radius 0.3s;
        }

        .stats-row {
            margin-top: 20px; width: 100%;
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
        }
        .stat-box {
            background: rgba(255,255,255,0.08); border-radius: 14px;
            padding: 10px 12px; text-align: center;
        }
        .stat-num { font-family: 'Baloo 2', cursive; font-size: 1.5rem; font-weight: 800; line-height: 1; }
        .stat-lbl { font-size: 0.68rem; opacity: 0.5; margin-top: 2px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
        .stat-box.warn .stat-num { color: var(--col2); }
        .stat-box.ok .stat-num { color: var(--col3); }

        .alert-box {
            margin-top: 14px; width: 100%;
            background: rgba(255,211,61,0.15); border: 1.5px solid rgba(255,211,61,0.4);
            border-radius: 14px; padding: 10px 14px;
            font-size: 0.8rem; color: #FFD93D; line-height: 1.5; text-align: center;
        }

        /* ── PRINT ZONE ── */
        .print-page-preview {
            background: white; padding: 20px;
            margin: 32px auto; max-width: 1024px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border-radius: 20px; text-align: center;
        }
        .print-page-title {
            font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 700;
            color: #CCC; margin-bottom: 16px; letter-spacing: 0.05em;
        }

        .card {
            width: 280px; height: 280px;
            transition: all 0.2s; position: relative; overflow: hidden;
            border-width: 3px; display: inline-block; margin: 8px;
            vertical-align: top; background: white;
        }
        .symbol-item { position: absolute; display: flex; align-items: center; justify-content: center; }
        .layout-6 .pos-0 { top:12%; left:15%; width:28%; height:28%; }
        .layout-6 .pos-1 { top:12%; left:55%; width:28%; height:28%; }
        .layout-6 .pos-2 { top:40%; left:35%; width:28%; height:28%; }
        .layout-6 .pos-3 { top:68%; left:15%; width:28%; height:28%; }
        .layout-6 .pos-4 { top:68%; left:55%; width:28%; height:28%; }
        .layout-6 .pos-5 { top:40%; left:5%;  width:28%; height:28%; }
        .layout-3 .pos-0 { top:15%; left:30%; width:40%; height:40%; }
        .layout-3 .pos-1 { top:55%; left:10%; width:40%; height:40%; }
        .layout-3 .pos-2 { top:55%; left:50%; width:40%; height:40%; }

        .cursive-font { font-family: 'Dancing Script', cursive; }

        /* ── SCROLLBAR ── */
        .pool-grid::-webkit-scrollbar { width: 6px; }
        .pool-grid::-webkit-scrollbar-track { background: transparent; }
        .pool-grid::-webkit-scrollbar-thumb { background: #DDD; border-radius: 6px; }

        /* ── PROGRESS BAR ── */
        .progress-block { width: 100%; margin-top: 20px; }
        .progress-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
        .progress-label { font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 700; }
        .progress-status { font-size: 0.75rem; font-weight: 800; }
        .progress-track {
            width: 100%; height: 10px; background: rgba(255,255,255,0.1);
            border-radius: 99px; overflow: hidden; position: relative;
        }
        .progress-bar {
            height: 100%; border-radius: 99px;
            transition: width 0.4s cubic-bezier(.4,0,.2,1), background 0.4s;
        }
        .progress-hint {
            margin-top: 8px; font-size: 0.72rem; opacity: 0.5;
            text-align: center; line-height: 1.4;
        }

        /* ── PRINT ── */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            .print-page-preview {
                width: 210mm !important; height: 297mm !important;
                padding: 10mm !important; margin: 0 !important;
                display: grid !important;
                grid-template-columns: repeat(2, 1fr) !important;
                grid-template-rows: repeat(3, 1fr) !important;
                gap: 8mm !important;
                page-break-after: always;
                box-shadow: none !important; border-radius: 0 !important;
            }
            .print-page-title { display: none !important; }
            .card {
                width: 88mm !important; height: 88mm !important;
                border: 1.5px dashed #AAA !important; margin: auto !important;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>
<div class="app-wrapper no-print">
    <!-- HEADER -->
    <header>
        <div class="logo-block">
            <span class="logo-title">🎯 EduDobble</span>
            <span class="logo-sub">Atelier de jeux pédagogiques</span>
        </div>
        <button class="btn-print" onclick="window.print()">🖨️ Imprimer le jeu</button>
    </header>

    <div class="main-grid">
        <!-- LEFT COLUMN -->
        <div>
            <!-- MODE -->
            <div class="panel">
                <div class="panel-title">⚙️ Niveau de difficulté</div>
                <div class="mode-row">
                    <button class="mode-btn" id="btnMode3" onclick="setMode(3)">
                        <span class="mode-icon">🌱</span>
                        <strong>3 symboles par carte</strong>
                        <span style="font-size:0.75rem;color:#AAA;">7 cartes</span>
                    </button>
                    <button class="mode-btn" id="btnMode6" onclick="setMode(6)">
                        <span class="mode-icon">🚀</span>
                        <strong>6 symboles par carte</strong>
                        <span style="font-size:0.75rem;color:#AAA;">31 cartes</span>
                    </button>
                </div>
            </div>

            <!-- SYMBOLS -->
            <div class="panel">
                <div class="panel-title">
                    🧩 Mes Symboles
                    <span style="margin-left:auto;font-size:0.85rem;color:var(--text-soft);">
                        <span id="countDisplay" style="font-weight:900;color:var(--col4);">0</span>
                        / <span id="targetDisplay">31</span>
                    </span>
                </div>

                <div class="input-row">
                    <input type="text" id="textInput" class="txt-input" placeholder="Ex: ou, A, chat, ☀️…" onkeydown="if(event.key==='Enter')addTextSymbol()">
                    <button class="btn-add" onclick="addTextSymbol()">+ Ajouter</button>
                </div>

                <button class="file-upload-btn" onclick="document.getElementById('fileInput').click()">
                    📸 Charger une image
                </button>
                <input type="file" id="fileInput" style="display:none" multiple onchange="handleMultipleFiles(this.files)">

                <div class="pool-grid" id="symbolsList" style="margin-top:12px;"></div>

                <!-- PRESETS -->
                <div class="preset-section">
                    <div class="preset-label">📚 Bibliothèques prêtes à l'emploi</div>
                    <div class="preset-grid" id="presetGrid"></div>
                </div>
            </div>

            <!-- CUSTOMIZATION -->
            <div class="panel">
                <div class="panel-title">🎨 Personnalisation</div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
                    <div>
                        <div style="font-size:0.75rem;font-weight:800;color:#AAA;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;">Couleur du fond</div>
                        <div class="color-row" id="colorPicker"></div>
                        <div style="font-size:0.75rem;font-weight:800;color:#AAA;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;margin-top:12px;">Forme de la carte</div>
                        <div class="shape-row">
                            <button class="shape-btn active" id="shapeCircle" onclick="updateShape('rounded-full',this)">⬤ Rond</button>
                            <button class="shape-btn" id="shapeSquare" onclick="updateShape('rounded-2xl',this)">■ Carré</button>
                        </div>
                    </div>
                    <div>
                        <div style="font-size:0.75rem;font-weight:800;color:#AAA;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;">Taille des symboles</div>
                        <input type="range" min="20" max="110" value="45" class="size-range" oninput="updateSize(this.value)">
                        <div style="text-align:center;font-size:0.8rem;color:#AAA;margin-top:6px;" id="sizeLabel">45px</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT SIDEBAR -->
        <div class="sidebar">
            <div class="preview-panel">
                <div class="preview-label">Aperçu de la carte</div>
                <div class="preview-card-wrap">
                    <div id="previewContainer" style="border-radius:50%;"></div>
                </div>
                <div class="progress-block" id="progressBlock">
                    <div class="progress-top">
                        <span class="progress-label" id="progressLabel">0 / 31 symboles</span>
                        <span class="progress-status" id="progressStatus">manquants</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-bar" id="progressBar" style="width:0%"></div>
                        <div class="progress-target" id="progressTarget"></div>
                    </div>
                    <div class="progress-hint" id="progressHint">Ajoutez 31 symboles pour générer 31 cartes</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- PRINT ZONE -->
<div id="printZone"></div>

<script>
    let pool = [];
    let currentShape = 'circle';
    let currentBg = '#ffffff';
    let currentBorder = '#e2e8f0';
    let symbolSize = 45;
    let symbolsPerCard = 6;

    // ── PRESETS ──────────────────────────────────────────────
    const presets = [
        {
            id: 'maths',
            icon: '🔢',
            name: 'Maths',
            desc: 'Chiffres 0–10, dés & nombres en lettres',
            color: '#FFD93D',
            symbols: [
                // Chiffres arabes 0 à 10
                {v:'0'}, {v:'1'}, {v:'2'}, {v:'3'}, {v:'4'},
                {v:'5'}, {v:'6'}, {v:'7'}, {v:'8'}, {v:'9'}, {v:'10'},
                // Dés (faces simples 1–6)
                {v:'⚀'}, {v:'⚁'}, {v:'⚂'}, {v:'⚃'}, {v:'⚄'}, {v:'⚅'},
                // Combinaisons dés pour 7
                {v:'⚃+⚂'}, {v:'⚄+⚁'},
                // Combinaisons dés pour 8
                {v:'⚃+⚃'}, {v:'⚄+⚂'},
                // Combinaisons dés pour 9
                {v:'⚄+⚃'}, {v:'⚅+⚂'},
                // Combinaisons dés pour 10
                {v:'⚄+⚄'}, {v:'⚅+⚃'},
                // Nombres en lettres 0 à 10
                {v:'zéro'}, {v:'un'}, {v:'deux'}, {v:'trois'}, {v:'quatre'},
                {v:'cinq'}, {v:'six'}, {v:'sept'}, {v:'huit'}, {v:'neuf'}, {v:'dix'}
            ]
        },
        {
            id: 'phono',
            icon: '🗣️',
            name: 'Phonologie CP',
            desc: 'Graphèmes complexes prioritaires',
            color: '#4D96FF',
            symbols: [
                // Sons voyelles composés (haute fréquence)
                {v:'ou'}, {v:'oi'}, {v:'au'}, {v:'eau'}, {v:'ai'}, {v:'ei'}, {v:'eu'}, {v:'œu'},
                // Nasales
                {v:'on'}, {v:'om'}, {v:'an'}, {v:'am'}, {v:'en'}, {v:'em'},
                {v:'in'}, {v:'im'}, {v:'ain'}, {v:'ein'}, {v:'un'},
                // Consonnes complexes
                {v:'ch'}, {v:'ph'}, {v:'gn'}, {v:'qu'}, {v:'gu'},
                // Groupes vocaliques & semi-voyelles
                {v:'oin'}, {v:'ien'}, {v:'ion'}, {v:'ail'}, {v:'eil'},
                // Finales muettes fréquentes
                {v:'er'}, {v:'ez'}
            ]
        },
        {
            id: 'lettres',
            icon: '✍️',
            name: 'Lettres',
            desc: 'Cursives minuscules, script minuscules & majuscules',
            color: '#6BCB77',
            symbols: [
                // Cursives minuscules
                {v:'a', s:'cursive'}, {v:'b', s:'cursive'}, {v:'c', s:'cursive'},
                {v:'d', s:'cursive'}, {v:'e', s:'cursive'}, {v:'f', s:'cursive'},
                {v:'g', s:'cursive'}, {v:'h', s:'cursive'}, {v:'i', s:'cursive'},
                {v:'j', s:'cursive'}, {v:'k', s:'cursive'}, {v:'l', s:'cursive'},
                {v:'m', s:'cursive'}, {v:'n', s:'cursive'}, {v:'o', s:'cursive'},
                {v:'p', s:'cursive'}, {v:'q', s:'cursive'}, {v:'r', s:'cursive'},
                {v:'s', s:'cursive'}, {v:'t', s:'cursive'}, {v:'u', s:'cursive'},
                {v:'v', s:'cursive'}, {v:'w', s:'cursive'}, {v:'x', s:'cursive'},
                {v:'y', s:'cursive'}, {v:'z', s:'cursive'},
                // Script minuscules
                {v:'a'}, {v:'b'}, {v:'c'}, {v:'d'}, {v:'e'}, {v:'f'},
                {v:'g'}, {v:'h'}, {v:'i'}, {v:'j'}, {v:'k'}, {v:'l'},
                {v:'m'}, {v:'n'}, {v:'o'}, {v:'p'}, {v:'q'}, {v:'r'},
                {v:'s'}, {v:'t'}, {v:'u'}, {v:'v'}, {v:'w'}, {v:'x'},
                {v:'y'}, {v:'z'},
                // Script majuscules
                {v:'A'}, {v:'B'}, {v:'C'}, {v:'D'}, {v:'E'}, {v:'F'},
                {v:'G'}, {v:'H'}, {v:'I'}, {v:'J'}, {v:'K'}, {v:'L'},
                {v:'M'}, {v:'N'}, {v:'O'}, {v:'P'}, {v:'Q'}, {v:'R'},
                {v:'S'}, {v:'T'}, {v:'U'}, {v:'V'}, {v:'W'}, {v:'X'},
                {v:'Y'}, {v:'Z'}

            ]
        },
        {
            id: 'animaux',
            icon: '🐾',
            name: 'Animaux',
            desc: 'Emojis animaux',
            color: '#FF9A3C',
            symbols: [
                {v:'🐶'}, {v:'🐱'}, {v:'🐭'}, {v:'🐹'}, {v:'🐰'}, {v:'🦊'}, {v:'🐻'},
                {v:'🐼'}, {v:'🐨'}, {v:'🐯'}, {v:'🦁'}, {v:'🐮'}, {v:'🐷'}, {v:'🐸'},
                {v:'🐙'}, {v:'🐧'}, {v:'🐦'}, {v:'🦆'}, {v:'🦅'}, {v:'🦉'}, {v:'🦋'},
                {v:'🐢'}, {v:'🐍'}, {v:'🦎'}, {v:'🦖'}, {v:'🦕'}, {v:'🐳'}, {v:'🦈'},
                {v:'🐘'}, {v:'🦒'}, {v:'🦓'}
            ]
        },
        {
            id: 'couleurs',
            icon: '🌈',
            name: 'Couleurs',
            desc: 'Noms & cercles colorés',
            color: '#C77DFF',
            symbols: [
                {v:'🔴'}, {v:'🟠'}, {v:'🟡'}, {v:'🟢'}, {v:'🔵'}, {v:'🟣'},
                {v:'⚫'}, {v:'⚪'}, {v:'🟤'}, {v:'Rouge'}, {v:'Orange'}, {v:'Jaune'},
                {v:'Vert'}, {v:'Bleu'}, {v:'Violet'}, {v:'Noir'}, {v:'Blanc'}, {v:'Marron'},
                {v:'Rose'}, {v:'Gris'}, {v:'Cyan'}, {v:'🩷'}, {v:'🩵'}, {v:'🩶'},
                {v:'🌹'}, {v:'🍋'}, {v:'🍀'}, {v:'🌊'}, {v:'🍇'}, {v:'🖤'}, {v:'🤍'}
            ]
        }
    ];

    // ── PRESET SELECTIONS ────────────────────────────────────
    const presetSelections = {};

    function renderPresets() {
        const grid = document.getElementById('presetGrid');
        grid.innerHTML = '';
        presets.forEach(p => {
            if (!presetSelections[p.id]) presetSelections[p.id] = new Set();
            const sel = presetSelections[p.id];

            const card = document.createElement('div');
            card.className = 'preset-card';
            card.id = 'preset-' + p.id;

            // Header
            const header = document.createElement('div');
            header.className = 'preset-card-header';
            header.innerHTML = `
                <span class="preset-card-icon">${p.icon}</span>
                <div>
                    <div class="preset-card-name">${p.name}</div>
                    <div class="preset-card-desc">${p.desc} · ${p.symbols.length} symboles</div>
                </div>
                <span class="preset-card-arrow">▼</span>
            `;
            header.onclick = () => card.classList.toggle('open');

            // Selector panel
            const selector = document.createElement('div');
            selector.className = 'preset-selector';

            const symGrid = document.createElement('div');
            symGrid.className = 'preset-symbols-grid';

            p.symbols.forEach((s, idx) => {
                const chip = document.createElement('div');
                const isCursive = s.s === 'cursive';
                chip.className = 'sym-check' + (sel.has(idx) ? ' checked' : '');
                chip.textContent = s.v;
                if (isCursive) chip.style.fontFamily = "\'Dancing Script\', cursive";
                chip.onclick = () => {
                    if (sel.has(idx)) { sel.delete(idx); chip.classList.remove('checked'); }
                    else { sel.add(idx); chip.classList.add('checked'); }
                    updateCountLabel(sel, countLabel, addBtn);
                };
                symGrid.appendChild(chip);
            });

            const actions = document.createElement('div');
            actions.className = 'preset-actions';

            const selectAll = document.createElement('button');
            selectAll.className = 'preset-select-all';
            selectAll.textContent = 'Tout sélectionner';
            selectAll.onclick = () => {
                p.symbols.forEach((_, idx) => sel.add(idx));
                symGrid.querySelectorAll('.sym-check').forEach(c => c.classList.add('checked'));
                updateCountLabel(sel, countLabel, addBtn);
            };

            const clearAll = document.createElement('button');
            clearAll.className = 'preset-select-all';
            clearAll.style.color = '#FF6B6B';
            clearAll.textContent = 'Tout désélectionner';
            clearAll.onclick = () => {
                sel.clear();
                symGrid.querySelectorAll('.sym-check').forEach(c => c.classList.remove('checked'));
                updateCountLabel(sel, countLabel, addBtn);
            };

            const countLabel = document.createElement('span');
            countLabel.className = 'preset-count-label';
            updateCountLabel(sel, countLabel, null);

            const addBtn = document.createElement('button');
            addBtn.className = 'preset-add-btn';
            addBtn.textContent = '+ Ajouter au jeu';
            addBtn.disabled = sel.size === 0;
            addBtn.onclick = () => {
                p.symbols.forEach((s, idx) => {
                    if (!sel.has(idx)) return;
                    const alreadyIn = pool.some(item => item.val === s.v && item.style === (s.s || 'standard'));
                    if (!alreadyIn) pool.push({ type: 'text', val: s.v, style: s.s || 'standard' });
                });
                renderAll();
            };

            updateCountLabel(sel, countLabel, addBtn);

            actions.appendChild(selectAll);
            actions.appendChild(clearAll);
            actions.appendChild(countLabel);
            actions.appendChild(addBtn);
            selector.appendChild(symGrid);
            selector.appendChild(actions);
            card.appendChild(header);
            card.appendChild(selector);
            grid.appendChild(card);
        });
    }

    function updateCountLabel(sel, label, btn) {
        const n = sel.size;
        label.textContent = n > 0 ? `${n} sélectionné${n > 1 ? 's' : ''}` : '';
        if (btn) btn.disabled = n === 0;
    }

    // ── CORE ──────────────────────────────────────────────────
    function setMode(num) {
        symbolsPerCard = num;
        document.getElementById('btnMode3').classList.toggle('active', num === 3);
        document.getElementById('btnMode6').classList.toggle('active', num === 6);
        renderAll();
    }

    function addTextSymbol() {
        const input = document.getElementById('textInput');
        const val = input.value.trim();
        if (val) {
            pool.push({ type: 'text', val, style: 'standard' });
            input.value = '';
            renderAll();
        }
    }

    async function handleMultipleFiles(files) {
        if (!files || files.length === 0) return;
        for (const file of files) {
            const dataUrl = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
            pool.push({ type: 'img', val: dataUrl });
        }
        renderAll();
    }

    function deleteFromPool(i) {
        pool.splice(i, 1);
        activePreset = null;
        renderPresets();
        renderAll();
    }

    function updateShape(shape, btn) {
        currentShape = shape;
        document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        renderAll();
    }

    function updateBg(bg, b, dotEl) {
        currentBg = bg; currentBorder = b;
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        if (dotEl) dotEl.classList.add('active');
        renderAll();
    }

    function updateSize(v) {
        symbolSize = v;
        document.getElementById('sizeLabel').textContent = v + 'px';
        renderAll();
    }

    // ── DOBBLE ALGO ───────────────────────────────────────────
    function generateIndexes() {
        const n = symbolsPerCard - 1;
        let cards = [];
        let firstCard = [];
        for (let i = 0; i <= n; i++) firstCard.push(i);
        cards.push(firstCard);
        for (let j = 0; j < n; j++) {
            for (let k = 0; k < n; k++) {
                let card = [j + 1];
                for (let i = 0; i < n; i++) card.push((n + 1) + n * i + (j * i + k) % n);
                cards.push(card);
            }
        }
        return cards;
    }

    // ── RENDER ────────────────────────────────────────────────
    function renderAll() {
        const target = symbolsPerCard === 3 ? 7 : 31;
        const count = pool.length;

        // Update count display
        document.getElementById('countDisplay').textContent = count;
        document.getElementById('targetDisplay').textContent = target;

        // Progress bar
        const pct = Math.min(100, Math.round(count / target * 100));
        const bar = document.getElementById('progressBar');
        const lbl = document.getElementById('progressLabel');
        const hint = document.getElementById('progressHint');
        const status = document.getElementById('progressStatus');
        bar.style.width = pct + '%';
        lbl.textContent = count + ' / ' + target + ' symboles';
        if (count === 0) {
            status.textContent = ''; status.style.color = '#AAA';
            hint.textContent = 'Ajoutez ' + target + ' symboles pour générer ' + target + ' cartes';
            bar.style.background = 'rgba(255,255,255,0.15)';
        } else if (count < target) {
            const left = target - count;
            status.textContent = '− ' + left + ' pour compléter';
            status.style.color = '#FFD93D';
            hint.textContent = 'Le jeu se génère à partir de ' + target + ' symboles';
            bar.style.background = 'linear-gradient(90deg, #FFD93D, #FF9A3C)';
        } else {
            status.textContent = '✓ Jeu complet !';
            status.style.color = '#6BCB77';
            hint.textContent = target + ' cartes prêtes à imprimer 🎉';
            bar.style.background = 'linear-gradient(90deg, #6BCB77, #3EC16D)';
        }

        // Pool list
        const list = document.getElementById('symbolsList');
        list.innerHTML = '';
        pool.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'pool-item';
            const isCursive = item.style === 'cursive';
            div.innerHTML = item.type === 'text'
                ? `<span class="${isCursive ? 'cursive-font' : ''}" style="font-size:${isCursive ? '1.1rem' : '0.9rem'};font-weight:800;">${item.val}</span>`
                : `<img src="${item.val}" style="width:100%;height:100%;object-fit:contain;">`;
            div.innerHTML += `<div class="del-btn" onclick="deleteFromPool(${i})">✕</div>`;
            list.appendChild(div);
        });

        // Preview card
        const indexes = generateIndexes();
        const preview = document.getElementById('previewContainer');
        const shapeStyle = currentShape === 'circle' ? '50%' : '18px';
        preview.style.borderRadius = shapeStyle;
        preview.style.backgroundColor = currentBg;
        preview.style.borderColor = currentBorder;
        preview.innerHTML = createCardHTML(indexes[0], 180);

        // Print zone
        const zone = document.getElementById('printZone');
        zone.innerHTML = '';
        let currentPage;
        indexes.forEach((cardIdx, i) => {
            if (i % 6 === 0) {
                currentPage = document.createElement('div');
                currentPage.className = 'print-page-preview no-print';
                const title = document.createElement('div');
                title.className = 'print-page-title';
                title.textContent = `Page ${Math.floor(i / 6) + 1}`;
                currentPage.appendChild(title);
                zone.appendChild(currentPage);
            }
            const cardDiv = document.createElement('div');
            const shapeClass = currentShape === 'circle' ? 'rounded-full' : 'rounded-[2rem]';
            cardDiv.className = `card`;
            cardDiv.style.borderRadius = currentShape === 'circle' ? '50%' : '28px';
            cardDiv.style.backgroundColor = currentBg;
            cardDiv.style.borderColor = currentBorder;
            cardDiv.style.borderStyle = 'solid';
            cardDiv.innerHTML = createCardHTML(cardIdx, 280);
            currentPage.appendChild(cardDiv);
        });
    }

    function createCardHTML(symbolIndexes, cardSize) {
        let html = `<div class="relative w-full h-full p-4 layout-${symbolsPerCard}" style="width:100%;height:100%;position:relative;">`;
        symbolIndexes.forEach((idx, i) => {
            const item = pool[idx] || { type: 'text', val: '', style: 'standard' };
            const rot = (Math.random() * 60 - 30);
            const scale = cardSize / 300;
            const size = (symbolsPerCard === 3 ? symbolSize * 1.8 : symbolSize) * scale;
            const isCursive = item.style === 'cursive';

            const content = item.type === 'img'
                ? `<img src="${item.val}" style="width:${size}px;height:${size}px;object-fit:contain;">`
                : `<span style="font-size:${isCursive ? size * 1.2 : size}px;font-weight:800;color:#2D2D2D;" class="${isCursive ? 'cursive-font' : ''}">${item.val}</span>`;

            html += `<div class="symbol-item pos-${i}" style="transform:rotate(${rot}deg);">${content}</div>`;
        });
        return html + '</div>';
    }

    // ── COLOR PICKER ──────────────────────────────────────────
    const colors = [
        { bg: '#ffffff', b: '#e2e8f0', label: 'Blanc' },
        { bg: '#f0fdf4', b: '#bbf7d0', label: 'Vert clair' },
        { bg: '#fffbeb', b: '#fef3c7', label: 'Jaune clair' },
        { bg: '#f0f9ff', b: '#bae6fd', label: 'Bleu clair' },
        { bg: '#fdf2f8', b: '#f9a8d4', label: 'Rose clair' },
        { bg: '#f5f3ff', b: '#ddd6fe', label: 'Violet clair' },
    ];
    const picker = document.getElementById('colorPicker');
    colors.forEach((c, idx) => {
        const btn = document.createElement('button');
        btn.className = 'color-dot' + (idx === 0 ? ' active' : '');
        btn.style.backgroundColor = c.bg;
        btn.style.borderColor = c.b;
        btn.title = c.label;
        btn.onclick = () => updateBg(c.bg, c.b, btn);
        picker.appendChild(btn);
    });

    // ── INIT ──────────────────────────────────────────────────
    renderPresets();
    setMode(6);
</script>
